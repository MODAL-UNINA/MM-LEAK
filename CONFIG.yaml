# =============================================================================
# Configuration File
#
# Default settings for model paths, training hyperparameters, and evaluation
# Override individual settings in Python code or via environment variables
# =============================================================================

# =============================================================================
# Model Configuration
# =============================================================================
models:
  # Target model (multimodal, 7B parameters)
  target_model: "Qwen/Qwen2-VL-7B-Instruct"
  target_model_precision: "bfloat16"  # Options: float32, float16, bfloat16
  
  # Attacker LLM (text generation, 600M parameters)
  attacker_model: "Qwen/Qwen3-0.6B"
  attacker_model_precision: "float16"
  
  # Embedding model (for strategy novelty detection)
  embedder_model: "sentence-transformers/all-MiniLM-L6-v2"
  embedder_dim: 384
  
  # Diffusion model (for image generation)
  diffusion_model: "stabilityai/stable-diffusion-xl-base-1.0"
  diffusion_precision: "float16"
  
  # LoRA adapter (for target model fine-tuning)
  lora_adapter_path: "path_to_LoRa"
  load_lora: true
  merge_lora: true
  lora_alpha: 32
  lora_dropout: 0.05
